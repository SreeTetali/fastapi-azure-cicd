name: Backend CI Pipeline

on:
  push:
    branches: [ "**" ] # Run when we push our current branch
  pull_request:
    branches: [ "main" ] # Run when someone tries to merge into main

jobs:
  build-and-test:
    runs-on: ubuntu-latest # 2. ENVIRONMENT: Spin up a fresh Linux server

    # Since our backend is in a subfolder, we tell GitHub to run commands there
    defaults:
      run:
        working-directory: ./backend 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install testing and linting tools temporarily on the server
        pip install pytest flake8 httpx 

    - name: Lint with flake8 (Code Quality Check)
      # This checks for critical syntax errors
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run unit tests with pytest
      # This runs the test_main.py file you just created
      run: pytest
